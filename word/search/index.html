<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caça-Palavras Temático</title>
    <style>
      :root {
        --bg: #f5f7ff;
        --panel: #ffffff;
        --ink: #1f2a44;
        --accent: #3b82f6;
        --accent-2: #10b981;
        --warn: #ef4444;
        --cell: #eef2ff;
        --cell-border: #c7d2fe;
        --found: #bbf7d0;
        --cursor: #fde68a;
        --selected: #93c5fd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 18px;
      }

      .app {
        width: min(980px, 100%);
        background: var(--panel);
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        padding: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      .controls label {
        font-size: 0.9rem;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      select,
      button {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #dbe3ff;
        font-size: 0.95rem;
        background: #fff;
      }

      button {
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        border: none;
        font-weight: 600;
      }

      button:hover {
        filter: brightness(1.05);
      }

      .content {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 14px;
      }

      .board-wrap {
        overflow: auto;
        border: 1px solid #dbe3ff;
        border-radius: 12px;
        padding: 10px;
        background: #fafbff;
      }

      .board {
        display: grid;
        gap: 4px;
        user-select: none;
        touch-action: none;
      }

      .cell {
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--cell);
        border: 1px solid var(--cell-border);
        font-weight: 700;
        color: #0f172a;
        font-size: 0.98rem;
        cursor: pointer;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .cell.provisional {
        background: var(--selected);
      }

      .cell.start {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      .cell.found {
        background: var(--found);
        border-color: #86efac;
      }

      .side {
        border: 1px solid #dbe3ff;
        border-radius: 12px;
        padding: 10px;
        background: #fafbff;
      }

      .status {
        font-size: 0.95rem;
        margin-bottom: 8px;
      }

      .words {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 6px;
      }

      .words li {
        padding: 8px;
        border-radius: 8px;
        background: #eef2ff;
        border: 1px solid #dbe3ff;
        font-weight: 600;
      }

      .words li.found {
        text-decoration: line-through;
        background: #dcfce7;
        border-color: #86efac;
      }

      .message {
        min-height: 24px;
        margin-top: 10px;
        font-weight: 700;
      }

      .message.ok {
        color: var(--accent-2);
      }

      .message.err {
        color: var(--warn);
      }

      .hint {
        margin-top: 10px;
        font-size: 0.88rem;
        line-height: 1.35;
        color: #334155;
      }

      @media (max-width: 860px) {
        .controls {
          grid-template-columns: 1fr 1fr;
        }

        .content {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Caça-Palavras Temático</h1>
      <div class="controls">
        <label>
          Tema
          <select id="theme"></select>
        </label>
        <label>
          Dificuldade
          <select id="difficulty">
            <option value="easy">Fácil</option>
            <option value="medium">Médio</option>
            <option value="hard">Difícil</option>
          </select>
        </label>
        <label>
          Tamanho
          <select id="size">
            <option value="10">10x10</option>
            <option value="12">12x12</option>
            <option value="14">14x14</option>
          </select>
        </label>
        <label style="justify-content: flex-end">
          <span style="visibility: hidden">jogar</span>
          <button id="new-game">Novo jogo</button>
        </label>
      </div>

      <section class="content">
        <div class="board-wrap">
          <div
            id="board"
            class="board"
            aria-label="Tabuleiro do caça-palavras"
          ></div>
        </div>
        <aside class="side">
          <div class="status" id="status"></div>
          <div class="status" id="metrics"></div>
          <ul id="word-list" class="words"></ul>
          <div id="message" class="message"></div>
          <div class="hint">
            - Clique e arraste para selecionar uma palavra.
          </div>
        </aside>
      </section>
    </main>

    <script>
      const THEMES = {
        animais: [
          "CAVALO", "VACA", "PORCO", "GALINHA", "CACHORRO",
          "GATO", "OVELHA", "COELHO", "PATO", "BURRO",
          "ZEBRA", "LEAO", "TIGRE", "ELEFANTE", "GIRAFA",
          "MACACO", "LOBO", "URSO", "RAPOSA", "COBRA",
          "PEIXE", "AGUIA", "PAPAGAIO", "TARTARUGA", "TUBARAO",
        ],
        frutas: [
          "MACA", "BANANA", "PERA", "MANGA", "UVA",
          "MELAO", "KIWI", "LARANJA", "GOIABA", "ABACAXI",
          "MORANGO", "CEREJA", "LIMAO", "ABACATE", "COCO",
          "MAMAO", "MELANCIA", "AMEIXA", "PESSEGO", "FIGO",
          "CAJU", "GRAVIOLA", "PITANGA", "JABUTICABA", "ACEROLA",
        ],
        paises: [
          "BRASIL", "CANADA", "MEXICO", "CHILE", "JAPAO",
          "CHINA", "EGITO", "FRANCA", "ITALIA", "INDIA",
          "PERU", "CUBA", "GRECIA", "RUSSIA", "TURQUIA",
          "ANGOLA", "GHANA", "NIGERIA", "KENYA", "CUBA",
          "SUECIA", "POLONIA", "AUSTRIA", "BELGICA", "PORTUGAL",
        ],
        matematica: [
          "SOMA", "SUBTRACAO", "PRODUTO", "DIVISAO", "FRACAO",
          "NUMERO", "ANGULO", "CONTA", "RAIZ", "AREA",
          "CIRCULO", "TRIANGULO", "QUADRADO", "VOLUME", "INTEIRO",
          "PAR", "IMPAR", "METRO", "GRAU", "VETOR",
          "PLANO", "EIXO", "CONJUNTO", "FATORIAL", "POTENCIA",
        ].map((w) => w.normalize("NFD").replace(/[\u0300-\u036f]/g, "")),
      };

      const DIFFICULTY = {
        easy: {
          label: "Fácil",
          dirs: [
            [0, 1],
            [1, 0],
          ],
          wordsCount: 6,
        },
        medium: {
          label: "Médio",
          dirs: [
            [0, 1],
            [1, 0],
            [1, 1],
          ],
          wordsCount: 7,
        },
        hard: {
          label: "Difícil",
          dirs: [
            [0, 1],
            [1, 0],
            [1, 1],
            [0, -1],
            [-1, 0],
            [-1, -1],
            [1, -1],
            [-1, 1],
          ],
          wordsCount: 8,
        },
      };

      const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      const WORD_COLORS = [
        "#93c5fd", // azul
        "#fcd34d", // âmbar
        "#6ee7b7", // verde-esmeralda
        "#fca5a5", // vermelho
        "#c4b5fd", // violeta
        "#fdba74", // laranja
        "#67e8f9", // ciano
        "#f9a8d4", // rosa
        "#bef264", // limão
        "#a5b4fc", // índigo
      ];

      function hexToRgb(hex) {
        return [
          parseInt(hex.slice(1, 3), 16),
          parseInt(hex.slice(3, 5), 16),
          parseInt(hex.slice(5, 7), 16),
        ];
      }

      function mixHexColors(colors) {
        if (!colors || colors.length === 0) return "#bbf7d0";
        if (colors.length === 1) return colors[0];
        const rgbs = colors.map(hexToRgb);
        const avg = [0, 1, 2].map(
          (i) => rgbs.reduce((s, c) => s + c[i], 0) / rgbs.length,
        );
        return (
          "#" +
          avg
            .map((v) => Math.round(v).toString(16).padStart(2, "0"))
            .join("")
        );
      }

      const state = {
        grid: [],
        size: 12,
        difficulty: "easy",
        theme: "animais",
        words: [],
        foundWords: new Set(),
        foundCells: new Set(),
        startTimeMs: 0,
        elapsedSeconds: 0,
        timerId: null,
        provisionalCells: [],
        dragStart: null,
        dragEnd: null,
        dragging: false,
        wordColors: new Map(),
        cellColors: new Map(),
        colorIndex: 0,
      };

      const boardEl = document.getElementById("board");
      const wordListEl = document.getElementById("word-list");
      const messageEl = document.getElementById("message");
      const statusEl = document.getElementById("status");
      const metricsEl = document.getElementById("metrics");
      const themeEl = document.getElementById("theme");
      const difficultyEl = document.getElementById("difficulty");
      const sizeEl = document.getElementById("size");
      const newGameBtn = document.getElementById("new-game");

      function setupControls() {
        Object.keys(THEMES).forEach((key) => {
          const opt = document.createElement("option");
          opt.value = key;
          opt.textContent = key[0].toUpperCase() + key.slice(1);
          themeEl.appendChild(opt);
        });

        themeEl.addEventListener("change", () => {
          state.theme = themeEl.value;
          startNewGame();
        });

        difficultyEl.addEventListener("change", () => {
          state.difficulty = difficultyEl.value;
          startNewGame();
        });

        sizeEl.addEventListener("change", () => {
          state.size = Number(sizeEl.value);
          startNewGame();
        });

        newGameBtn.addEventListener("click", startNewGame);
      }

      function startNewGame() {
        if (state.timerId) {
          clearInterval(state.timerId);
          state.timerId = null;
        }

        state.foundWords.clear();
        state.foundCells.clear();
        state.startTimeMs = Date.now();
        state.elapsedSeconds = 0;
        state.provisionalCells = [];
        state.dragStart = null;
        state.dragEnd = null;
        state.dragging = false;
        state.wordColors = new Map();
        state.cellColors = new Map();
        state.colorIndex = 0;
        buildPuzzle();
        renderBoard();
        renderWordList();
        updateStatus();
        startTimer();
        setMessage("Novo jogo iniciado!", "ok");
      }

      function startTimer() {
        state.timerId = setInterval(() => {
          state.elapsedSeconds = Math.floor(
            (Date.now() - state.startTimeMs) / 1000,
          );
          updateStatus();
        }, 1000);
      }

      function buildPuzzle() {
        const size = state.size;
        const rules = DIFFICULTY[state.difficulty];
        const sourceWords = shuffle([...THEMES[state.theme]]);

        const selectedWords = sourceWords
          .filter((w) => w.length <= size)
          .slice(0, rules.wordsCount);

        let attempts = 0;
        let grid;
        let placements;
        while (attempts < 80) {
          ({ grid, placements } = tryGenerateGrid(
            size,
            selectedWords,
            rules.dirs,
          ));
          if (placements.length === selectedWords.length) break;
          attempts += 1;
        }

        if (!placements || placements.length !== selectedWords.length) {
          throw new Error("Não foi possível gerar o tabuleiro.");
        }

        fillEmpty(grid);
        state.grid = grid;
        state.words = placements.map((p) => ({
          text: p.word,
          cells: p.cells,
          start: p.cells[0],
          end: p.cells[p.cells.length - 1],
        }));
      }

      function tryGenerateGrid(size, words, dirs) {
        const grid = Array.from({ length: size }, () => Array(size).fill(""));
        const placements = [];

        for (const word of words) {
          let placed = false;
          const wordAttempts = 180;

          for (let i = 0; i < wordAttempts; i++) {
            const [dr, dc] = dirs[Math.floor(Math.random() * dirs.length)];
            const row = Math.floor(Math.random() * size);
            const col = Math.floor(Math.random() * size);
            const cells = [];

            let valid = true;
            for (let j = 0; j < word.length; j++) {
              const rr = row + dr * j;
              const cc = col + dc * j;
              if (!inBounds(rr, cc, size)) {
                valid = false;
                break;
              }
              const current = grid[rr][cc];
              if (current && current !== word[j]) {
                valid = false;
                break;
              }
              cells.push({ row: rr, col: cc });
            }

            if (!valid) continue;

            cells.forEach((cell, idx) => {
              grid[cell.row][cell.col] = word[idx];
            });

            placements.push({ word, cells });
            placed = true;
            break;
          }

          if (!placed) {
            return { grid, placements: [] };
          }
        }

        return { grid, placements };
      }

      function fillEmpty(grid) {
        for (let r = 0; r < grid.length; r++) {
          for (let c = 0; c < grid.length; c++) {
            if (!grid[r][c]) {
              grid[r][c] =
                ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
            }
          }
        }
      }

      function renderBoard() {
        boardEl.innerHTML = "";
        boardEl.style.gridTemplateColumns = `repeat(${state.size}, 34px)`;

        for (let r = 0; r < state.size; r++) {
          for (let c = 0; c < state.size; c++) {
            const cell = document.createElement("button");
            cell.type = "button";
            cell.className = "cell";
            cell.textContent = state.grid[r][c];
            cell.dataset.row = String(r);
            cell.dataset.col = String(c);
            cell.setAttribute(
              "aria-label",
              `Letra ${state.grid[r][c]} linha ${r + 1} coluna ${c + 1}`,
            );

            const key = makeKey(r, c);
            if (state.foundCells.has(key)) {
              cell.classList.add("found");
              const colors = state.cellColors.get(key) || [];
              const mixed = mixHexColors(colors);
              cell.style.background = mixed;
              cell.style.borderColor = mixed;
            }
            if (state.provisionalCells.some((p) => p.row === r && p.col === c))
              cell.classList.add("provisional");
            if (
              state.dragStart &&
              state.dragStart.row === r &&
              state.dragStart.col === c
            )
              cell.classList.add("start");

            cell.addEventListener("pointerdown", (ev) =>
              handlePointerDown(ev, r, c),
            );

            boardEl.appendChild(cell);
          }
        }
      }

      function renderWordList() {
        wordListEl.innerHTML = "";
        state.words.forEach((word) => {
          const li = document.createElement("li");
          li.textContent = word.text;
          if (state.foundWords.has(word.text)) li.classList.add("found");
          wordListEl.appendChild(li);
        });
      }

      function updateStatus() {
        const total = state.words.length;
        const found = state.foundWords.size;
        statusEl.textContent = `Tema: ${state.theme} | Nível: ${DIFFICULTY[state.difficulty].label} | Encontradas: ${found}/${total}`;

        const seconds = Math.max(1, state.elapsedSeconds);
        const minutes = seconds / 60;
        const wpm = (found / minutes).toFixed(2);
        metricsEl.textContent = `Tempo: ${formatTime(state.elapsedSeconds)} | Palavras/min: ${wpm}`;
      }

      function formatTime(totalSeconds) {
        const min = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
        const sec = String(totalSeconds % 60).padStart(2, "0");
        return `${min}:${sec}`;
      }

      function setMessage(text, type = "") {
        messageEl.textContent = text;
        messageEl.className = `message ${type}`.trim();
      }

      function handlePointerDown(ev, row, col) {
        if (ev.button !== undefined && ev.button !== 0 && ev.pointerType === "mouse") return;
        ev.preventDefault();
        ev.target.setPointerCapture(ev.pointerId);
        state.dragging = true;
        state.dragStart = { row, col };
        state.dragEnd = { row, col };
        state.provisionalCells = [{ row, col }];
        renderBoard();
      }

      function getCellFromPoint(x, y) {
        const el = document.elementFromPoint(x, y);
        if (!el) return null;
        const btn = el.closest("[data-row]");
        if (!btn) return null;
        return { row: Number(btn.dataset.row), col: Number(btn.dataset.col) };
      }

      document.addEventListener("pointermove", (ev) => {
        if (!state.dragging || !state.dragStart) return;
        ev.preventDefault();
        const cell = getCellFromPoint(ev.clientX, ev.clientY);
        if (!cell) return;
        state.dragEnd = cell;
        const path = getStraightPath(state.dragStart, cell);
        state.provisionalCells = path || [{ ...state.dragStart }];
        renderBoard();
      }, { passive: false });

      document.addEventListener("pointerup", (ev) => {
        if (!state.dragging) return;
        const origin = state.dragStart;
        const end = state.dragEnd || getCellFromPoint(ev.clientX, ev.clientY);
        state.dragging = false;
        state.dragStart = null;
        state.dragEnd = null;
        state.provisionalCells = [];
        if (end && (origin.row !== end.row || origin.col !== end.col)) {
          finalizeSelection(origin, end);
        } else {
          renderBoard();
        }
      });

      function finalizeSelection(start, end) {
        const path = getStraightPath(start, end);
        if (!path) {
          state.provisionalCells = [];
          setMessage(
            "Seleção inválida: use linha reta (horizontal, vertical ou diagonal).",
            "err",
          );
          renderBoard();
          return;
        }

        const selectedWord = path
          .map((cell) => state.grid[cell.row][cell.col])
          .join("");
        const reversedWord = selectedWord.split("").reverse().join("");
        const pathKeys = path.map((cell) => makeKey(cell.row, cell.col));

        const match = state.words.find((word) => {
          if (state.foundWords.has(word.text)) return false;
          if (word.text !== selectedWord && word.text !== reversedWord)
            return false;

          const wordForward = word.cells.map((cell) =>
            makeKey(cell.row, cell.col),
          );
          const wordReverse = [...wordForward].reverse();
          return (
            sameSequence(pathKeys, wordForward) ||
            sameSequence(pathKeys, wordReverse)
          );
        });

        if (match) {
          state.foundWords.add(match.text);
          const color = WORD_COLORS[state.colorIndex % WORD_COLORS.length];
          state.colorIndex++;
          state.wordColors.set(match.text, color);
          match.cells.forEach((cell) => {
            const key = makeKey(cell.row, cell.col);
            state.foundCells.add(key);
            if (!state.cellColors.has(key)) state.cellColors.set(key, []);
            state.cellColors.get(key).push(color);
          });
          setMessage(`Boa! Você encontrou: ${match.text}`, "ok");
        } else {
          setMessage(
            "Essa seleção não corresponde a uma palavra da lista.",
            "err",
          );
        }

        state.provisionalCells = [];
        renderBoard();
        renderWordList();
        updateStatus();

        if (state.foundWords.size === state.words.length) {
          if (state.timerId) {
            clearInterval(state.timerId);
            state.timerId = null;
          }
          setMessage("Parabéns! Você encontrou todas as palavras.", "ok");
        }
      }

      function sameSequence(a, b) {
        if (a.length !== b.length) return false;
        for (let i = 0; i < a.length; i++) {
          if (a[i] !== b[i]) return false;
        }
        return true;
      }

      function getStraightPath(start, end) {
        const dr = end.row - start.row;
        const dc = end.col - start.col;
        const stepRow = Math.sign(dr);
        const stepCol = Math.sign(dc);

        const isHorizontal = dr === 0 && dc !== 0;
        const isVertical = dc === 0 && dr !== 0;
        const isDiagonal = Math.abs(dr) === Math.abs(dc) && dr !== 0;
        const isSingle = dr === 0 && dc === 0;

        if (!(isHorizontal || isVertical || isDiagonal || isSingle)) {
          return null;
        }

        if (isSingle) return [{ row: start.row, col: start.col }];

        const path = [];
        let row = start.row;
        let col = start.col;

        while (true) {
          path.push({ row, col });
          if (row === end.row && col === end.col) break;
          row += stepRow;
          col += stepCol;
          if (!inBounds(row, col, state.size)) return null;
        }

        return path;
      }

      function inBounds(row, col, size) {
        return row >= 0 && row < size && col >= 0 && col < size;
      }

      function makeKey(row, col) {
        return `${row},${col}`;
      }

      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      setupControls();
      startNewGame();
    </script>
  </body>
</html>
