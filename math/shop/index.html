<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadinho Matemático 🍎</title>
    <style>
        :root {
            --primary: #FF9F43;
            --secondary: #54A0FF;
            --success: #10AC84;
            --bg: #F1F2F6;
            --shelf: #747D8C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            user-select: none;
            background-image: repeating-linear-gradient(135deg, #fffbe6 0 40px, #f1f2f6 40px 80px);
            min-height: 100vh;
        }

        /* Painel Superior */
        .hud {
            display: flex; gap: 20px; margin-bottom: 20px; width: 100%; max-width: 800px;
            justify-content: space-between;
        }
        .info-box {
            background: white; padding: 10px 20px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-weight: bold; font-size: 1.1rem;
        }

        /* Área do Cliente */
        .customer-area {
            background: white; width: 100%; max-width: 800px; padding: 20px;
            border-radius: 20px; margin-bottom: 20px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 3px solid #ffeaa7;
        }
        .order-bubble {
            font-size: 1.3rem; margin: 15px 0; padding: 15px;
            background: #EBF3FF; border-radius: 15px; border-left: 5px solid var(--secondary);
            display: flex; align-items: center; gap: 12px;
        }

        /* Área de Arraste (Dinheiro) */
        .wallet {
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;
            background: linear-gradient(90deg, #ffeaa7 0%, #dff9fb 100%);
            padding: 20px; border-radius: 15px; margin-bottom: 20px;
            border: 2px solid #f6e58d;
        }
        .money-item {
            width: 80px; height: 45px; background: #576574; color: white;
            display: flex; align-items: center; justify-content: center;
            border-radius: 5px; font-weight: bold; cursor: grab;
            box-shadow: 0 3px 0 #222f3e; transition: transform 0.2s;
            font-size: 1.2rem;
            position: relative;
        }
        .money-item::after {
            content: '💵';
            position: absolute; right: 6px; bottom: 2px; font-size: 1.1rem; opacity: 0.5;
        }
        .money-item.coin::after { content: '🪙'; right: 2px; bottom: 2px; }
        .money-item.coin { width: 50px; height: 50px; border-radius: 50%; background: #F1C40F; color: #7F8C8D; box-shadow: 0 3px 0 #D4AC0D; }
        .money-item:active { cursor: grabbing; transform: scale(0.95); }
        .money-item.dragging {
            outline: 3px solid var(--secondary);
            box-shadow: 0 0 12px 2px var(--secondary);
            z-index: 2;
        }

        /* Efeito pulse ao soltar */
        .checkout-zone.pulse {
            animation: pulse 0.4s;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 var(--primary); }
            70% { box-shadow: 0 0 20px 10px var(--primary); }
            100% { box-shadow: 0 0 0 0 var(--primary); }
        }

        /* Área de Depósito (Caixa) */
        .checkout-zone {
            width: 100%; max-width: 300px; height: 120px;
            border: 3px dashed var(--primary); border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0 auto; background: #FFF; transition: background 0.3s;
            box-shadow: 0 2px 12px #ffbe76aa;
        }
        .checkout-zone.over { background: #FFEAA7; }
        .current-total { font-size: 1.8rem; color: var(--primary); font-weight: bold; transition: background 0.3s, box-shadow 0.3s; }
        .current-total.success {
            background: #dff9fb;
            box-shadow: 0 0 16px 2px #10ac84aa;
            border-radius: 10px;
            animation: pop-success 0.5s;
        }
        @keyframes pop-success {
            0% { transform: scale(1); }
            30% { transform: scale(1.15); }
            60% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* Mensagem de Vitória */
        #victory-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }

        button {
            padding: 12px 30px; font-size: 1.1rem; background: var(--success);
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="hud">
        <div class="info-box" style="flex:1;max-width:220px;">
            <label for="game-mode" style="font-weight:bold;">Modo de Jogo:</label>
            <select id="game-mode" style="font-size:1rem;padding:4px 8px;border-radius:6px;margin-left:8px;">
                <option value="cliente">Cliente</option>
                <option value="operador">Operador do Caixa</option>
            </select>
        </div>
        <div class="info-box">Nível: <span id="lvl">1</span></div>
        <div class="info-box">Clientes: <span id="clients">0/3</span></div>
        <div class="info-box">Tempo: <span id="timer">0</span>s</div>
    </div>

    <div class="instructions" style="max-width:800px;margin-bottom:12px;background:#fffbe6;border-left:6px solid #FF9F43;padding:16px 20px;border-radius:14px;box-shadow:0 2px 8px #0001;font-size:1.15rem;">
        <b>Como jogar:</b> Arraste as notas e moedas para o caixa para ajudar o cliente a pagar a compra. Se errar, tente novamente!
    </div>
    <div class="customer-area">
        <div id="customer-emoji" style="font-size: 3rem;">👵</div>
        <div class="order-bubble" id="order-text"><span id="order-emoji">🍎</span> <span id="order-desc">Calculando pedido...</span></div>
        
        <p>Arraste as notas e moedas para pagar:</p>
        
        <div class="checkout-zone" id="drop-zone">
            <div style="font-size: 0.9rem; color: #999;">COLOQUE O DINHEIRO AQUI</div>
            <div class="current-total">R$ <span id="total-inserted">0.00</span></div>
            <div id="inserted-notes" style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;"></div>
        </div>
        
        <div style="margin-top: 15px;">
            <button onclick="marketGame.clearPayment()" style="background: #EE5253; padding: 8px 15px;">Limpar</button>
            <button onclick="marketGame.confirmPayment()">Confirmar Pagamento</button>
        </div>
    </div>


    <div class="wallet" id="money-source">
        <!-- Gerado via JS -->
    </div>

    <div id="error-message" style="display:none;position:fixed;top:30px;left:50%;transform:translateX(-50%);background:#EE5253;color:white;padding:16px 32px;border-radius:10px;font-size:1.2rem;z-index:200;box-shadow:0 4px 16px #0002;font-weight:bold;transition:opacity 0.3s;"></div>

    <div id="victory-screen">
        <h1 style="color: var(--success); font-size: 3rem;">PARABÉNS! 🌟</h1>
        <p style="font-size: 1.2rem;">Você atendeu todos os clientes!</p>
        <button onclick="marketGame.nextLevel()">Próximo Nível 🚀</button>
    </div>

    <script>
        // Gerador de Sons Sintéticos
        const Sound = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(f, t, d) {
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.type = t; o.frequency.value = f;
                g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + d);
            },
            cash() { this.play(800, 'sine', 0.2); setTimeout(()=>this.play(1200, 'sine', 0.3), 50); },
            error() { this.play(150, 'square', 0.3); },
            drop() { this.play(400, 'sine', 0.1); }
        };

        const marketGame = {
            level: 1,
            clientsDone: 0,
            targetClients: 3,
            targetValue: 0,
            currentInserted: 0,
            insertedNotes: [],
            seconds: 0,
            timer: null,
            mode: 'cliente',

            init() {
                this.setupModeSelector();
                this.resetLevel();
                this.startTimer();
                this.renderMoney();
                this.setupDragAndDrop();
            },

            setupModeSelector() {
                const modeSelect = document.getElementById('game-mode');
                if (modeSelect) {
                    modeSelect.value = this.mode;
                    modeSelect.onchange = (e) => {
                        this.mode = e.target.value;
                        this.resetLevel();
                    };
                }
            },

            resetLevel() {
                this.clientsDone = 0;
                this.currentInserted = 0;
                this.updateUI();
                this.newOrder();
                document.getElementById('victory-screen').style.display = 'none';
            },

            newOrder() {
                this.currentInserted = 0;
                this.insertedNotes = [];
                this.setCustomerEmoji();
                const values = this.getAvailableValues();
                const prod = this.getRandomProduct();
                document.getElementById('order-emoji').innerText = prod.emoji;
                if (this.mode === 'cliente') {
                    this.targetValue = this.generatePossibleValue(values, this.level <= 2 ? 20 : 30, this.level > 2);
                    this.setOrderDescriptionCliente(prod);
                    this.valorPago = null;
                } else {
                    this.targetValue = this.generatePossibleValue(values, this.level <= 2 ? 20 : 30, this.level > 2);
                    this.valorPago = this.generateValorPago(this.targetValue, values);
                    this.setOrderDescriptionOperador(prod);
                }
                this.updateTotalDisplay();

            },

            setCustomerEmoji() {
                const emojis = ['👨‍🦰', '👩‍🦱', '👵', '👨‍🦳', '👧'];
                document.getElementById('customer-emoji').innerText = emojis[Math.floor(Math.random() * emojis.length)];
            },

            getAvailableValues() {
                return this.level > 2 ? [0.05, 0.1, 0.25, 0.5, 1, 2, 5, 10, 20] : [1, 2, 5, 10, 20];
            },

            getRandomProduct() {
                const products = [
                    { emoji: '🍎', nome: 'maçã' },
                    { emoji: '🍞', nome: 'pão' },
                    { emoji: '🥛', nome: 'leite' },
                    { emoji: '🍫', nome: 'chocolate' },
                    { emoji: '🍪', nome: 'biscoito' },
                    { emoji: '🥕', nome: 'cenoura' },
                    { emoji: '🍌', nome: 'banana' },
                    { emoji: '🧃', nome: 'suco' }
                ];
                return products[Math.floor(Math.random() * products.length)];
            },

            setOrderDescriptionCliente(prod) {
                document.getElementById('order-desc').innerHTML = `Olá! Minha compra de <b>${prod.nome}</b> deu <b>R$ ${parseFloat(this.targetValue).toFixed(2)}</b>. Pode me ajudar com o pagamento?`;
            },

            setOrderDescriptionOperador(prod) {
                document.getElementById('order-desc').innerHTML = `O cliente comprou <b>${prod.nome}</b> no valor de <b>R$ ${parseFloat(this.targetValue).toFixed(2)}</b> e pagou <b>R$ ${parseFloat(this.valorPago).toFixed(2)}</b>. Separe o troco correto!`;
            },

            generateValorPago(targetValue, values) {
                let pago = parseFloat(targetValue);
                let valorPago = pago;
                for (let i = 0; i < 10; i++) {
                    let extra = values[Math.floor(Math.random() * values.length)];
                    if (extra > 0 && (pago + extra) > pago && (pago + extra) <= (this.level <= 2 ? 20 : 30)) {
                        valorPago = (pago + extra).toFixed(2);
                        break;
                    }
                }
                return valorPago;
            },

            // Gera um valor possível a partir das combinações das notas/moedas disponíveis
            generatePossibleValue(values, max, allowCents) {
                // Gera todas as combinações possíveis até o valor máximo
                let possible = new Set();
                function combine(sum, idx) {
                    if (sum > max) return;
                    if (sum > 0) possible.add(allowCents ? sum.toFixed(2) : sum.toString());
                    for (let i = idx; i < values.length; i++) {
                        combine(sum + values[i], i);
                    }
                }
                combine(0, 0);
                const arr = Array.from(possible);
                // Escolhe um valor aleatório possível
                return arr.length ? arr[Math.floor(Math.random() * arr.length)] : (allowCents ? '1.00' : '1');
            },

            renderMoney() {
                const container = document.getElementById('money-source');
                container.innerHTML = '';
                const values = this.getAvailableValues();
                values.forEach(val => {
                    container.appendChild(this.createMoneyItem(val));
                });
            },

            createMoneyItem(val) {
                const isCoin = val < 1;
                const div = document.createElement('div');
                div.className = isCoin ? 'money-item coin' : 'money-item';
                div.draggable = true;
                if (val === 0.05) div.innerText = '5¢';
                else if (val === 0.25) div.innerText = '25¢';
                else if (isCoin) div.innerText = `${(val*100)}¢`;
                else div.innerText = `R$ ${val}`;
                div.dataset.value = val;
                div.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text', val);
                    setTimeout(() => div.classList.add('dragging'), 0);
                });
                div.addEventListener('dragend', () => div.classList.remove('dragging'));
                div.addEventListener('click', () => {
                    this.addNote(val);
                });
                return div;
            },

            addNote(val) {
                this.currentInserted += val;
                this.insertedNotes.push(val);
                Sound.drop();
                this.updateTotalDisplay();
            },

            setupDragAndDrop() {
                const zone = document.getElementById('drop-zone');
                // Remove event listeners antigos usando cloneNode
                const newZone = zone.cloneNode(true);
                zone.parentNode.replaceChild(newZone, zone);
                // Adiciona listeners apenas uma vez
                newZone.addEventListener('dragover', (e) => { e.preventDefault(); newZone.classList.add('over'); });
                newZone.addEventListener('dragleave', () => newZone.classList.remove('over'));
                newZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    newZone.classList.remove('over');
                    newZone.classList.add('pulse');
                    setTimeout(() => newZone.classList.remove('pulse'), 400);
                    const val = parseFloat(e.dataTransfer.getData('text'));
                    this.currentInserted += val;
                    this.insertedNotes.push(val);
                    Sound.drop();
                    this.updateTotalDisplay();
                });
            },

            updateTotalDisplay() {
                document.getElementById('total-inserted').innerText = this.currentInserted.toFixed(2);
                this.renderInsertedNotes();
            },

            renderInsertedNotes() {
                const cont = document.getElementById('inserted-notes');
                cont.innerHTML = '';
                this.insertedNotes.forEach((val, idx) => {
                    cont.appendChild(this.createInsertedNote(val, idx));
                });
            },

            createInsertedNote(val, idx) {
                const isCoin = val < 1;
                const div = document.createElement('div');
                div.className = isCoin ? 'money-item coin' : 'money-item';
                if (val === 0.05) div.innerText = '5¢';
                else if (val === 0.25) div.innerText = '25¢';
                else if (isCoin) div.innerText = `${(val*100)}¢`;
                else div.innerText = `R$ ${val}`;
                div.title = 'Clique para remover';
                div.style.cursor = 'pointer';
                div.onclick = () => {
                    this.currentInserted -= val;
                    this.insertedNotes.splice(idx, 1);
                    this.updateTotalDisplay();
                };
                return div;
            },

            clearPayment() {
                this.currentInserted = 0;
                this.insertedNotes = [];
                this.updateTotalDisplay();
            },

            confirmPayment() {
                const totalEl = document.querySelector('.current-total');
                const values = this.getAvailableValues();
                let used = this.insertedNotes.length;
                let min;
                let canAdvance = true;
                if (this.mode === 'cliente') {
                    min = this.getMinNotes(parseFloat(this.targetValue), values);
                    if (Math.abs(this.currentInserted - parseFloat(this.targetValue)) < 0.01) {
                        if (used > min) {
                            this.showErrorMessage('Tente usar uma combinação com menos notas/moedas!');
                            canAdvance = false;
                        }
                        if (canAdvance) {
                            Sound.cash();
                            totalEl.classList.add('success');
                            setTimeout(() => totalEl.classList.remove('success'), 700);
                            this.clientsDone++;
                            if (this.clientsDone >= this.targetClients) {
                                this.showVictory();
                            } else {
                                setTimeout(() => this.newOrder(), 600);
                            }
                        }
                    } else {
                        Sound.error();
                        this.showErrorMessage("O valor está incorreto. Tente novamente!");
                        this.clearPayment();
                    }
                } else {
                    const trocoCorreto = (parseFloat(this.valorPago) - parseFloat(this.targetValue));
                    min = this.getMinNotes(trocoCorreto, values);
                    if (Math.abs(this.currentInserted - trocoCorreto) < 0.01) {
                        if (used > min) {
                            this.showErrorMessage('Tente usar uma combinação com menos notas/moedas!');
                            canAdvance = false;
                        }
                        if (canAdvance) {
                            Sound.cash();
                            totalEl.classList.add('success');
                            setTimeout(() => totalEl.classList.remove('success'), 700);
                            this.clientsDone++;
                            if (this.clientsDone >= this.targetClients) {
                                this.showVictory();
                            } else {
                                setTimeout(() => this.newOrder(), 600);
                            }
                        }
                    } else {
                        Sound.error();
                        this.showErrorMessage(`O troco está incorreto. O correto seria R$ ${trocoCorreto.toFixed(2)}!`);
                        this.clearPayment();
                    }
                }
                this.updateUI();
            },

            getMinNotes(target, values) {
                let t = Math.round(target * 100);
                let sorted = [...values].sort((a, b) => b - a);
                let count = 0;
                for (let v of sorted) {
                    let vCents = Math.round(v * 100);
                    if (vCents === 0) continue;
                    let n = Math.floor(t / vCents);
                    count += n;
                    t -= n * vCents;
                }
                return count;
            },

            showErrorMessage(msg) {
                const el = document.getElementById('error-message');
                el.innerText = msg;
                el.style.display = 'block';
                el.style.opacity = '1';
                setTimeout(() => {
                    el.style.opacity = '0';
                    setTimeout(() => { el.style.display = 'none'; }, 400);
                }, 1800);
            },

            updateUI() {
                document.getElementById('lvl').innerText = this.level;
                document.getElementById('clients').innerText = `${this.clientsDone}/${this.targetClients}`;
            },

            startTimer() {
                if (this.timer) clearInterval(this.timer);
                this.seconds = 0;
                this.timer = setInterval(() => {
                    this.seconds++;
                    document.getElementById('timer').innerText = this.seconds;
                }, 1000);
            },

            showVictory() {
                clearInterval(this.timer);
                document.getElementById('victory-screen').style.display = 'flex';
            },

            nextLevel() {
                this.level++;
                this.init();
            }
        };

        marketGame.init();
    </script>
</body>
</html>
